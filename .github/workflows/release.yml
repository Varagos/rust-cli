name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: contains(matrix.target, 'unknown-linux-musl')
        run: sudo apt-get install -y musl-tools

      - name: Configure Linux arm64 linker
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld" >> "$GITHUB_ENV"

      - name: Install qemu for Linux arm64 smoke test
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: sudo apt-get install -y qemu-user

      - name: Configure Windows arm64 linker
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: '"CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER=rust-lld" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append'

      - name: Build
        run: cargo build --release --manifest-path bitloops_cli/Cargo.toml --target ${{ matrix.target }}

      - name: Smoke test (Unix)
        if: runner.os != 'Windows' && matrix.target != 'aarch64-unknown-linux-musl'
        run: ./bitloops_cli/target/${{ matrix.target }}/release/bitloops --version

      - name: Smoke test (Linux arm64 via qemu)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: qemu-aarch64 ./bitloops_cli/target/${{ matrix.target }}/release/bitloops --version

      - name: Smoke test (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          & "bitloops_cli/target/${{ matrix.target }}/release/bitloops.exe" --version

      - name: Validate Windows arm64 build output
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $path = "bitloops_cli/target/${{ matrix.target }}/release/bitloops.exe"
          if (-not (Test-Path $path)) {
            throw "Missing expected binary: $path"
          }

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -C bitloops_cli/target/${{ matrix.target }}/release -czf dist/bitloops-${{ matrix.target }}.tar.gz bitloops

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path bitloops_cli/target/${{ matrix.target }}/release/bitloops.exe -DestinationPath dist/bitloops-${{ matrix.target }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/bitloops-${{ matrix.target }}.*

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum bitloops-* > checksums-sha256.txt

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/bitloops-*
            dist/checksums-sha256.txt

  verify:
    name: Verify published release artifacts
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Download assets from published release
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p verify
          cd verify
          assets=(
            bitloops-aarch64-apple-darwin.tar.gz
            bitloops-x86_64-apple-darwin.tar.gz
            bitloops-x86_64-unknown-linux-musl.tar.gz
            bitloops-aarch64-unknown-linux-musl.tar.gz
            bitloops-x86_64-pc-windows-msvc.zip
            bitloops-aarch64-pc-windows-msvc.zip
            checksums-sha256.txt
          )

          for asset in "${assets[@]}"; do
            curl -fL -o "$asset" "https://github.com/${REPO}/releases/download/${TAG}/${asset}"
          done

      - name: Verify checksums
        run: |
          cd verify
          sha256sum -c checksums-sha256.txt

      - name: Smoke test linux release binary
        run: |
          cd verify
          tar -xzf bitloops-x86_64-unknown-linux-musl.tar.gz
          chmod +x bitloops
          ./bitloops --version

      - name: Smoke test linux arm64 release binary via qemu
        run: |
          sudo apt-get install -y qemu-user
          cd verify
          mkdir -p arm64
          tar -xzf bitloops-aarch64-unknown-linux-musl.tar.gz -C arm64
          chmod +x arm64/bitloops
          qemu-aarch64 arm64/bitloops --version
